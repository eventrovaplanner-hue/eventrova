services:
  - type: web
    name: eventrova
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: YELP_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
